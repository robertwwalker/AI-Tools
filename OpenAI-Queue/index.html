<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Queue Simulator</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="./js/app.js"></script>

</head>

<body>

<h1>AI Request Queue Simulator</h1>

<div class="controls">

<label>
Arrival rate λ
<input id="lambda" type="range" min="0.1" max="5" step="0.1" value="1">
<span id="lambdaVal">1</span>
</label>

<label>
Service rate μ
<input id="mu" type="range" min="0.2" max="6" step="0.1" value="2">
<span id="muVal">2</span>
</label>

<button id="run">Run Simulation</button>

</div>

<div class="stats">

<p>Completed requests: <span id="completed">0</span></p>
<p>Average wait time: <span id="wait">0</span></p>
<p>Theoretical queue length: <span id="theory">0</span></p>

</div>

<h2>Queue Visualization</h2>

<div id="queue"></div>

</body>
</html>
